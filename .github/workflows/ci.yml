name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax & style check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install pyflakes

      - name: Check syntax (ast.parse)
        shell: python
        run: |
          import ast, sys, pathlib
          errors = []
          for p in pathlib.Path(".").rglob("*.py"):
            if any(part in p.parts for part in [".venv", "build", "dist"]):
              continue
            try:
              ast.parse(p.read_text(encoding="utf-8-sig"))
            except SyntaxError as e:
              errors.append(f"{p}: {e}")
          if errors:
            print("\n".join(errors))
            sys.exit(1)
          print(f"All Python files OK ({len(list(pathlib.Path('.').rglob('*.py')))} checked)")

      - name: Pyflakes (undefined names)
        run: python -m pyflakes lumina_control/

  build:
    name: PyInstaller build
    runs-on: windows-latest
    needs: lint
    # Only run on push to main (not PRs) to save runner minutes
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install PySide6 monitorcontrol screeninfo pywin32 pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller LuminaControl.spec

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: LuminaControl-exe
          path: dist/LuminaControl.exe
          if-no-files-found: warn
