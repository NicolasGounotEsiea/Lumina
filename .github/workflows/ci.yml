name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Syntax & style check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install pyflakes

      - name: Check syntax (ast.parse)
        shell: python
        run: |
          import ast, sys, pathlib
          errors = []
          for p in pathlib.Path(".").rglob("*.py"):
            if any(part in p.parts for part in [".venv", "build", "dist"]):
              continue
            try:
              ast.parse(p.read_text(encoding="utf-8-sig"))
            except SyntaxError as e:
              errors.append(f"{p}: {e}")
          if errors:
            print("\n".join(errors))
            sys.exit(1)
          print(f"All Python files OK ({sum(1 for _ in pathlib.Path('.').rglob('*.py'))} checked)")

      - name: Pyflakes (undefined names / unused imports)
        run: python -m pyflakes lumina_control/

  # ── 2. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build installer
    runs-on: windows-latest
    needs: lint
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-py3.11-${{ hashFiles('LuminaControl.spec') }}
          restore-keys: pip-py3.11-

      - name: Install dependencies
        run: pip install PySide6 monitorcontrol screeninfo pywin32 pyinstaller cryptography tzdata wmi

      - name: Build with PyInstaller
        run: pyinstaller LuminaControl.spec --noconfirm

      - name: Build installer with Inno Setup
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuminaControlSetup
          path: dist-installer\LuminaControlSetup.exe
          if-no-files-found: error

  # ── 3. Release (tag v* only) ─────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches AppVersion in installer.iss
        shell: python
        run: |
          import re, sys, os
          tag = os.environ["GITHUB_REF_NAME"]          # e.g. "v1.2.3"
          version = tag.lstrip("v")                    # e.g. "1.2.3"
          iss = open("installer.iss", encoding="utf-8").read()
          m = re.search(r"^AppVersion=(.+)$", iss, re.MULTILINE)
          if not m:
              print("AppVersion not found in installer.iss")
              sys.exit(1)
          iss_version = m.group(1).strip()
          if iss_version != version:
              print(f"Tag {tag!r} != AppVersion {iss_version!r} in installer.iss")
              sys.exit(1)
          print(f"Version OK: {version}")

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: LuminaControlSetup
          path: dist-installer

      - name: Extract changelog for this version
        shell: python
        run: |
          import re, os, sys
          tag     = os.environ["GITHUB_REF_NAME"]          # e.g. "v1.2.0"
          version = tag.lstrip("v")                        # e.g. "1.2.0"
          text    = open("CHANGELOG.md", encoding="utf-8").read()
          # Grab the block between this version header and the next "## [" header
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          if not m:
              print(f"Version {version} not found in CHANGELOG.md")
              sys.exit(1)
          notes = m.group(1).strip()
          header = (
              f"## Lumina Control {tag}\n\n"
              "### Installation\n"
              "Télécharge et exécute **LuminaControlSetup.exe**.\n"
              "Nécessite Windows 10/11 et des écrans compatibles DDC-CI.\n\n"
              "---\n\n"
          )
          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(header + notes)
          print("Release notes written.")

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist-installer\LuminaControlSetup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lumina Control ${{ github.ref_name }}"
          body_path: release_notes.md
          files: dist-installer\LuminaControlSetup.exe
          fail_on_unmatched_files: true
          generate_release_notes: false

  # ── 4. Mirror release → repo entreprise (updater public) ─────────────────────
  mirror-release:
    name: Mirror to enterprise repo
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout (CHANGELOG.md only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: LuminaControlSetup
          path: dist-installer

      - name: Build release notes
        shell: python
        run: |
          import re, os, sys
          tag     = os.environ["GITHUB_REF_NAME"]
          version = tag.lstrip("v")
          text    = open("CHANGELOG.md", encoding="utf-8").read()
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          notes = m.group(1).strip() if m else f"Release {tag}"
          header = (
              f"## Lumina Control {tag}\n\n"
              "### Installation\n"
              "Télécharge et exécute **LuminaControlSetup.exe**.\n"
              "Nécessite Windows 10/11 et des écrans compatibles DDC-CI.\n\n"
              "---\n\n"
          )
          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(header + notes)

      - name: Create release on enterprise repo
        uses: softprops/action-gh-release@v2
        with:
          repository: lumina-control-app/LuminaControl
          token: ${{ secrets.ENTERPRISE_RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Lumina Control ${{ github.ref_name }}"
          body_path: release_notes.md
          files: dist-installer/LuminaControlSetup.exe
          fail_on_unmatched_files: true
          generate_release_notes: false
